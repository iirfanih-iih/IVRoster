<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IV Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<style>
:root{--primary:#0068b3;--primary-light:#4da0d8;--bg:#f0f0f0;--white:#fff;--text:#333;--text2:#666;--border:#ddd;--shadow:0 2px 8px rgba(0,0,0,0.08);--red:#c0392b;--green:#2d7a3a;--gold:#d4a017;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;}
header{background:var(--white);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);box-shadow:var(--shadow);}
header .left{display:flex;align-items:center;gap:12px;}
header img{height:36px;}
header h1{font-family:'Playfair Display',serif;font-size:1.3rem;color:var(--primary);}
header .right{display:flex;align-items:center;gap:12px;font-size:.78rem;color:var(--text2);}
.btn{border:none;border-radius:8px;padding:8px 16px;font-size:.8rem;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;}
.btn-primary{background:var(--primary);color:var(--white);}.btn-primary:hover{background:var(--primary-light);}
.btn-outline{background:var(--white);color:var(--primary);border:1px solid var(--primary);}.btn-outline:hover{background:rgba(0,104,179,.08);}
.btn-danger{background:var(--red);color:var(--white);}.btn-sm{padding:5px 10px;font-size:.72rem;}
.container{max-width:1100px;margin:0 auto;padding:24px;}
.tabs{display:flex;gap:2px;margin-bottom:20px;border-bottom:2px solid var(--border);}
.tab{padding:10px 18px;font-size:.82rem;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;background:none;border-top:none;border-left:none;border-right:none;font-family:'DM Sans',sans-serif;}
.tab:hover{color:var(--text);}.tab.active{color:var(--primary);border-bottom-color:var(--primary);}
.panel{display:none;}.panel.active{display:block;}
.card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:20px;box-shadow:var(--shadow);margin-bottom:16px;}
.card-title{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--text);margin-bottom:12px;}
table{width:100%;border-collapse:collapse;}
th{font-size:.7rem;font-weight:600;text-transform:uppercase;color:var(--text2);padding:8px 12px;text-align:left;border-bottom:1px solid var(--border);}
td{padding:8px 12px;font-size:.8rem;border-bottom:1px solid #f0f0f0;}
tr:hover td{background:rgba(0,104,179,.03);}
.badge{display:inline-block;font-size:.65rem;font-weight:600;padding:2px 8px;border-radius:12px;}
.badge-admin{background:#e8f4fd;color:#0068b3;}.badge-leader{background:#e8fde8;color:#2d7a3a;}.badge-viewer{background:#f0f0f0;color:#666;}
.form-row{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap;}
.form-group{display:flex;flex-direction:column;gap:4px;flex:1;min-width:150px;}
.form-group label{font-size:.72rem;color:var(--text2);}
.form-group input,.form-group select{padding:8px 12px;border:1px solid var(--border);border-radius:6px;font-size:.82rem;font-family:'DM Sans',sans-serif;outline:none;}
.form-group input:focus,.form-group select:focus{border-color:var(--primary);}
.audit-entry{padding:10px 14px;border-bottom:1px solid #f5f5f5;font-size:.78rem;display:flex;gap:12px;align-items:flex-start;}
.audit-entry:hover{background:#fafafa;}
.audit-ts{color:var(--text2);font-size:.7rem;min-width:140px;}
.audit-user{font-weight:600;color:var(--primary);min-width:100px;}
.audit-action{flex:1;}
.audit-cat{font-size:.65rem;background:#f0f0f0;padding:1px 6px;border-radius:8px;color:var(--text2);}
.search-box{display:flex;gap:8px;margin-bottom:16px;}
.search-box input{flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:.85rem;font-family:'DM Sans',sans-serif;outline:none;}
.search-box input:focus{border-color:var(--primary);}
.duty-card{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;}
.duty-card .duty-name{font-weight:600;font-size:.82rem;}
.duty-card .duty-meta{font-size:.72rem;color:var(--text2);}
.stat-row{display:flex;gap:12px;margin-bottom:16px;}
.stat{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:14px 18px;flex:1;text-align:center;box-shadow:var(--shadow);}
.stat-num{font-family:'Playfair Display',serif;font-size:1.8rem;color:var(--primary);}
.stat-label{font-size:.7rem;color:var(--text2);margin-top:2px;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:20px;font-size:.8rem;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;}
.toast.ok{background:#1a2a1a;color:#7fdc9f;}.toast.err{background:#2a1a1a;color:#fc7f7f;}
.toast.show{opacity:1;}
.empty{text-align:center;padding:40px;color:var(--text2);font-size:.85rem;}
@media(max-width:768px){.form-row{flex-direction:column;}.stat-row{flex-wrap:wrap;}.stat{min-width:120px;}}
</style>
</head>
<body>
<header>
  <div class="left"><img src="iv-logo.png" alt="IV"><h1>Admin Panel</h1></div>
  <div class="right"><span id="userDisplay"></span><button class="btn btn-outline btn-sm" onclick="signOut()">Sign Out</button><a href="index.html" class="btn btn-outline btn-sm">← Dashboard</a></div>
</header>
<div class="container">
  <div class="tabs">
    <button class="tab active" onclick="showPanel('users')">👥 Users</button>
    <button class="tab" onclick="showPanel('audit')">📋 Audit Logs</button>
    <button class="tab" onclick="showPanel('search')">🔍 Member Search</button>
    <button class="tab" onclick="showPanel('settings')">⚙️ Settings</button>
  </div>
  <div id="usersPanel" class="panel active"></div>
  <div id="auditPanel" class="panel"></div>
  <div id="searchPanel" class="panel"></div>
  <div id="settingsPanel" class="panel"></div>
</div>
<div class="toast" id="toast"></div>

<script>
let currentProfile = null;
let allUsers = [];
let auditLogs = [];

// ── Init ──
async function init(){
  try{
    // Wait for Supabase to be ready
    if(!_supabase){await new Promise(r=>{const c=setInterval(()=>{if(_supabase){clearInterval(c);r();}},100);setTimeout(()=>{clearInterval(c);r();},3000);});}
    const session = await getSession();
    if(!session){window.location.href='index.html';return;}
    currentProfile = await getUserProfile();
    if(!currentProfile || currentProfile.role!=='admin'){
      window.location.href='index.html';return;
    }
    document.getElementById('userDisplay').textContent=currentProfile.name||currentProfile.email;
    await loadAllUsers();
    renderUsers();
    await loadAuditLogs();
    renderAudit();
    renderSearch();
    renderSettings();
  }catch(e){
    if(SUPABASE_URL.includes('YOUR_PROJECT')){
      document.getElementById('userDisplay').textContent='Local Mode';
      renderUsers();renderSearch();renderSettings();
    } else { window.location.href='index.html'; }
  }
}

// ── Tab switching ──
function showPanel(id){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id+'Panel').classList.add('active');
  event.target.classList.add('active');
}

// ══════════════════════════════════════
// USER MANAGEMENT
// ══════════════════════════════════════
async function loadAllUsers(){
  if(!_supabase)return;
  const{data}=await _supabase.from('profiles').select('*').order('created_at');
  allUsers=data||[];
}

function renderUsers(){
  const roleLabels={admin:'Admin',team_leader:'Team Leader',viewer:'Viewer'};
  const badgeClass={admin:'badge-admin',team_leader:'badge-leader',viewer:'badge-viewer'};
  let h=`<div class="card"><div class="card-title">All Users (${allUsers.length})</div>
    <table><thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Team</th><th>Actions</th></tr></thead><tbody>`;
  allUsers.forEach(u=>{
    h+=`<tr>
      <td><strong>${u.name||'—'}</strong></td>
      <td>${u.email}</td>
      <td><span class="badge ${badgeClass[u.role]||''}">${roleLabels[u.role]||u.role}</span></td>
      <td>${u.team||'All'}</td>
      <td>
        <button class="btn btn-outline btn-sm" onclick="editUser('${u.id}')">Edit</button>
        <button class="btn btn-sm" style="background:#f0f0f0;color:var(--text2);" onclick="resetPassword('${u.email}')">Reset PW</button>
      </td>
    </tr>`;
  });
  h+=`</tbody></table></div>`;

  // Add user form
  h+=`<div class="card"><div class="card-title">Add New User</div>
    <div class="form-row">
      <div class="form-group"><label>Name</label><input id="newName" placeholder="Full Name"></div>
      <div class="form-group"><label>Email</label><input id="newEmail" type="email" placeholder="email@example.com"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Password</label><input id="newPass" type="text" placeholder="Initial password"></div>
      <div class="form-group"><label>Role</label><select id="newRole"><option value="viewer">Viewer</option><option value="team_leader">Team Leader</option><option value="admin">Admin</option></select></div>
      <div class="form-group"><label>Team</label><select id="newTeam"><option value="">All (Admin)</option><option value="A">Team A</option><option value="B">Team B</option></select></div>
    </div>
    <button class="btn btn-primary" onclick="addUser()">+ Add User</button>
    <span id="addUserStatus" style="margin-left:12px;font-size:.78rem;"></span>
  </div>`;
  document.getElementById('usersPanel').innerHTML=h;
}

async function addUser(){
  const name=document.getElementById('newName').value.trim();
  const email=document.getElementById('newEmail').value.trim();
  const pass=document.getElementById('newPass').value;
  const role=document.getElementById('newRole').value;
  const team=document.getElementById('newTeam').value||null;
  const status=document.getElementById('addUserStatus');

  if(!name||!email||!pass){toast('Fill all fields','err');return;}
  if(pass.length<6){toast('Password must be at least 6 characters','err');return;}
  // Set force password change flag for new user
  const forceChange=true;
  status.textContent='Creating user…';status.style.color='#0068b3';

  try{
    const session = await getSession();
    const res = await fetch(SUPABASE_URL+'/functions/v1/create-user', {
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'Authorization':'Bearer '+session.access_token
      },
      body:JSON.stringify({email,password:pass,name,role,team})
    });
    const result = await res.json();
    if(!result.success) throw new Error(result.error);

    // Set force password change on first login
    if(forceChange && result.user_id){
      await _supabase.from('app_settings').upsert({key:'force_pw_change_'+result.user_id,value:'true'},{onConflict:'key'});
    }

    document.getElementById('newName').value='';
    document.getElementById('newEmail').value='';
    document.getElementById('newPass').value='';

    await logAudit('Created user: '+name,'users','Email: '+email+', Role: '+role+', Team: '+(team||'All'));
    await loadAllUsers();
    renderUsers();
    status.textContent='✓ User created!';
    status.style.color='#2d7a3a';
    toast('✓ User created: '+name);
  }catch(e){
    console.error('addUser error:',e);
    status.textContent='Error: '+(e.message||e);
    status.style.color='#c0392b';
    toast('Failed: '+(e.message||e),'err');
  }
}

async function editUser(id){
  const user=allUsers.find(u=>u.id===id);
  if(!user)return;
  const newRole=await ivPrompt('New role for '+user.name+'?\n(admin / team_leader / viewer)',user.role);
  if(!newRole||!['admin','team_leader','viewer'].includes(newRole))return;
  const newTeam=newRole==='admin'?null:await ivPrompt('Team? (A / B)',user.team||'A');

  try{
    await _supabase.from('profiles').update({role:newRole,team:newTeam||null}).eq('id',id);
    await logAudit('Updated user: '+user.name,'users','Role: '+newRole+', Team: '+(newTeam||'All'));
    await loadAllUsers();
    renderUsers();
    toast('✓ Updated '+user.name);
  }catch(e){toast('Failed: '+e.message,'err');}
}

async function resetPassword(email){
  const user=allUsers.find(u=>u.email===email);
  if(!user){toast('User not found','err');return;}
  const newPass=await ivPrompt('Set new password for '+email+':');
  if(!newPass)return;
  if(newPass.length<6){toast('Password must be at least 6 characters','err');return;}
  try{
    const session=await getSession();
    const res=await fetch(SUPABASE_URL+'/functions/v1/reset-password',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+session.access_token},
      body:JSON.stringify({user_id:user.id,new_password:newPass})
    });
    const result=await res.json();
    if(!result.success)throw new Error(result.error);
    await logAudit('Password reset','users','Email: '+email);
    toast('✓ Password updated for '+email);
  }catch(e){toast('Failed: '+(e.message||e),'err');}
}

// ══════════════════════════════════════
// AUDIT LOGS
// ══════════════════════════════════════
async function loadAuditLogs(){
  if(!_supabase)return;
  try{
    const{data}=await _supabase.from('audit_logs').select('*').order('ts',{ascending:false}).limit(200);
    auditLogs=data||[];
  }catch(e){console.warn('Audit load failed:',e);}
}

async function logAudit(action,category,detail){
  const entry={
    ts:new Date().toISOString(),
    username:currentProfile?.email||'system',
    user_display:currentProfile?.name||'System',
    action,category:category||'',detail:detail||''
  };
  auditLogs.unshift(entry);
  if(_supabase){
    try{await _supabase.from('audit_logs').insert(entry);}catch(e){console.warn(e);}
  }
  renderAudit();
}

function renderAudit(){
  let h=`<div class="card"><div class="card-title">Audit Logs (${auditLogs.length})</div>
    <div class="search-box"><input id="auditFilter" placeholder="Filter logs..." oninput="filterAudit()"></div>
    <div id="auditList" style="max-height:500px;overflow-y:auto;">`;
  auditLogs.slice(0,100).forEach(l=>{
    const d=new Date(l.ts);
    const ts=d.toLocaleDateString('en-NZ',{day:'numeric',month:'short'})+' '+d.toLocaleTimeString('en-NZ',{hour:'2-digit',minute:'2-digit'});
    h+=`<div class="audit-entry">
      <span class="audit-ts">${ts}</span>
      <span class="audit-user">${l.user_display||l.username||'—'}</span>
      <span class="audit-action">${l.action||''} ${l.detail?'<span class="audit-cat">'+l.detail+'</span>':''}</span>
    </div>`;
  });
  if(!auditLogs.length)h+='<div class="empty">No audit logs yet.</div>';
  h+=`</div></div>`;
  document.getElementById('auditPanel').innerHTML=h;
}

function filterAudit(){
  const q=(document.getElementById('auditFilter')?.value||'').toLowerCase();
  document.querySelectorAll('.audit-entry').forEach(el=>{
    el.style.display=el.textContent.toLowerCase().includes(q)?'':'none';
  });
}

// ══════════════════════════════════════
// MEMBER DUTY SEARCH
// ══════════════════════════════════════
function renderSearch(){
  let h=`<div class="card"><div class="card-title">Member Duty Lookup</div>
    <p style="font-size:.78rem;color:var(--text2);margin-bottom:12px;">Search for a member to see all their duty assignments across the current cycle.</p>
    <div class="search-box">
      <input id="memberSearch" placeholder="Type member name..." onkeydown="if(event.key==='Enter')searchMember()">
      <button class="btn btn-primary" onclick="searchMember()">Search</button>
      <select id="searchTeam" style="padding:8px;border:1px solid var(--border);border-radius:6px;font-size:.82rem;">
        <option value="A">Team A</option><option value="B">Team B</option>
      </select>
    </div>
    <div id="searchResults"></div>
  </div>`;
  document.getElementById('searchPanel').innerHTML=h;
}

async function searchMember(){
  const name=document.getElementById('memberSearch').value.trim();
  const team=document.getElementById('searchTeam').value;
  if(!name){toast('Enter a name','err');return;}
  if(!_supabase){toast('Database not connected','err');return;}

  const{data:rosters}=await _supabase.from('rosters').select('*').eq('team',team);
  if(!rosters||!rosters.length){
    document.getElementById('searchResults').innerHTML='<div class="empty">No rosters found for Team '+team+'</div>';
    return;
  }

  const duties=[];
  rosters.forEach(r=>{
    (r.roster||[]).forEach(row=>{
      if([...row.male,...row.female].some(n=>n.toLowerCase().includes(name.toLowerCase()))){
        duties.push({eventId:r.event_id,duty:row.duty,gender:row.male.some(n=>n.toLowerCase().includes(name.toLowerCase()))?'Male':'Female'});
      }
    });
  });

  let h=`<div style="margin-top:16px;"><strong>${duties.length} assignments found for "${name}" (Team ${team})</strong></div>`;
  if(duties.length){
    h+=`<div style="margin-top:12px;">`;
    duties.forEach(d=>{
      h+=`<div class="duty-card"><span class="duty-name">${d.duty}</span><span class="duty-meta">${d.eventId} · ${d.gender}</span></div>`;
    });
    h+=`</div>`;
  } else {
    h+=`<div class="empty">No duties found for this member in Team ${team}.</div>`;
  }
  document.getElementById('searchResults').innerHTML=h;
}

// ══════════════════════════════════════
// SETTINGS
// ══════════════════════════════════════
function renderSettings(){
  let h=`<div class="card"><div class="card-title">Database</div>
    <p style="font-size:.78rem;color:var(--text2);margin-bottom:12px;">Supabase project: <code>${SUPABASE_URL}</code></p>
    <button class="btn btn-outline" onclick="testConnection()">Test Connection</button>
    <span id="connStatus" style="margin-left:12px;font-size:.78rem;"></span>
  </div>
  <div class="card"><div class="card-title">Backup & Export</div>
    <p style="font-size:.78rem;color:var(--text2);margin-bottom:12px;">Download all roster data as JSON for disaster recovery.</p>
    <button class="btn btn-primary" onclick="exportAllData()">Download Full Backup</button>
  </div>`;
  document.getElementById('settingsPanel').innerHTML=h;
}

async function testConnection(){
  const el=document.getElementById('connStatus');
  el.textContent='Testing…';el.style.color='var(--primary)';
  try{
    const{data,error}=await _supabase.from('profiles').select('id').limit(1);
    if(error)throw error;
    el.textContent='✓ Connected';el.style.color='var(--green)';
  }catch(e){
    el.textContent='✗ Failed: '+e.message;el.style.color='var(--red)';
  }
}

// ── Toast ──
let _toastTimer;
function toast(msg,type='ok'){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast '+(type==='err'?'err':'ok');
  void t.offsetWidth;t.classList.add('show');
  if(_toastTimer)clearTimeout(_toastTimer);
  _toastTimer=setTimeout(()=>t.classList.remove('show'),3000);
}

async function exportAllData(){
  if(!_supabase){toast('Not connected','err');return;}
  try{
    const[r,o,p,s]=await Promise.all([
      _supabase.from('rosters').select('*'),
      _supabase.from('manual_overrides').select('*'),
      _supabase.from('profiles').select('*'),
      _supabase.from('app_settings').select('*'),
    ]);
    const backup={exported:new Date().toISOString(),rosters:r.data,overrides:o.data,profiles:p.data,settings:s.data};
    const blob=new Blob([JSON.stringify(backup,null,2)],{type:'application/json'});
    const link=document.createElement('a');
    link.href=URL.createObjectURL(blob);
    link.download='iv-roster-backup-'+new Date().toISOString().slice(0,10)+'.json';
    link.click();
    toast('✓ Backup downloaded');
    await logAudit('Full backup exported','settings','');
  }catch(e){toast('Export failed: '+e.message,'err');}
}

init();
</script>
</body>
</html>
