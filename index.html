<style>
:root{
  --dp:#020B18;--ds:#071628;--ds2:#0D2040;
  --dt:#E8F4FD;--dm:#7AAECB;--db:rgba(79,195,247,0.18);
  --blue:#1565C0;--blue2:#1976D2;--blue-lt:#4FC3F7;
  --navy:#0C2461;--green:#34D399;--green-bg:rgba(52,211,153,0.12);--green-bd:rgba(52,211,153,0.3);
  --gold:#F59E0B;--gold-bg:rgba(245,158,11,0.12);--gold-bd:rgba(245,158,11,0.3);
  --r:9px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Lexend',sans-serif;background:var(--dp);color:var(--dt);min-height:100vh;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--dp);}::-webkit-scrollbar-thumb{background:var(--blue);border-radius:3px;}

/* Login */
#loginScreen{position:fixed;inset:0;background:var(--dp);z-index:1000;display:flex;align-items:center;justify-content:center;
  background-image:radial-gradient(ellipse at 20% 50%,rgba(21,101,192,.18) 0%,transparent 60%);}
.lbox{background:var(--ds);border:1px solid var(--db);border-radius:16px;padding:44px 40px;width:400px;max-width:92vw;box-shadow:0 24px 64px rgba(0,0,0,.6);animation:fadeUp .5s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.llogo{text-align:center;margin-bottom:28px;}
.llogo-iv{display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;background:var(--blue2);border-radius:8px;font-family:'Barlow',sans-serif;font-weight:900;font-size:18px;color:#fff;margin-bottom:10px;}
.llogo h1{font-family:'Barlow',sans-serif;font-size:22px;font-weight:800;color:var(--blue-lt);text-transform:uppercase;letter-spacing:.04em;}
.llogo p{color:var(--dm);font-size:12px;margin-top:3px;}
.lfg{margin-bottom:15px;}
.lfg label{display:block;font-size:10px;font-weight:700;color:var(--dm);text-transform:uppercase;letter-spacing:.09em;margin-bottom:6px;}
.lfg input{width:100%;background:var(--ds2);border:1px solid var(--db);border-radius:var(--r);padding:10px 14px;color:var(--dt);font-family:'Lexend',sans-serif;font-size:13px;outline:none;transition:border .2s;}
.lfg input:focus{border-color:var(--blue-lt);}
.lbtn{width:100%;background:linear-gradient(135deg,var(--navy),var(--blue2));color:#fff;border:none;border-radius:var(--r);padding:12px;font-family:'Lexend',sans-serif;font-weight:700;font-size:14px;cursor:pointer;margin-top:6px;transition:box-shadow .2s;}
.lbtn:hover{box-shadow:0 6px 20px rgba(21,101,192,.4);}
.lbtn:disabled{opacity:.5;cursor:not-allowed;}
.lerr{color:#f88;font-size:12px;text-align:center;margin-top:10px;min-height:16px;}

/* App Layout */
#dashboard{display:none;height:100vh;}
.app-layout{display:flex;height:100%;}
.sidebar{width:220px;background:var(--ds);border-right:1px solid var(--db);display:flex;flex-direction:column;padding:16px 0;overflow-y:auto;}
.sb-logo{text-align:center;padding:12px 16px 20px;border-bottom:1px solid var(--db);margin-bottom:12px;}
.sb-logo .llogo-iv{margin-bottom:6px;}
.sb-logo h2{font-family:'Barlow',sans-serif;font-size:15px;font-weight:800;color:var(--blue-lt);text-transform:uppercase;letter-spacing:.04em;}
.sb-logo p{font-size:9px;color:var(--dm);margin-top:2px;}
.nav-group{padding:0 10px;margin-bottom:16px;}
.nav-label{font-size:9px;font-weight:700;color:var(--dm);text-transform:uppercase;letter-spacing:.1em;padding:0 8px;margin-bottom:6px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:500;color:var(--dm);transition:all .15s;text-decoration:none;}
.nav-item:hover{background:var(--ds2);color:var(--dt);}
.nav-item.active{background:rgba(79,195,247,0.1);color:var(--blue-lt);border:1px solid rgba(79,195,247,0.2);}
.nav-item .ni-icon{font-size:14px;width:20px;text-align:center;}
.sb-footer{margin-top:auto;padding:14px 16px;border-top:1px solid var(--db);}
.sb-user{font-size:10px;color:var(--dm);margin-bottom:8px;}
.sb-user strong{color:var(--dt);display:block;font-size:11px;margin-bottom:2px;}
.btn-logout{background:none;border:1px solid rgba(248,120,120,.3);border-radius:6px;padding:5px 12px;font-size:10px;color:#f88;cursor:pointer;font-family:'Lexend',sans-serif;transition:all .2s;width:100%;}
.btn-logout:hover{background:rgba(248,120,120,.1);border-color:#f88;}

/* Main content */
.main-content{flex:1;overflow-y:auto;padding:32px;}
.page{display:none;animation:fadeUp .3s ease;}
.page.active{display:block;}
.page-title{font-family:'Barlow',sans-serif;font-size:20px;font-weight:800;color:var(--blue-lt);text-transform:uppercase;letter-spacing:.03em;margin-bottom:6px;}
.page-sub{font-size:11px;color:var(--dm);margin-bottom:24px;}

/* Cards */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:16px;}
.card{background:var(--ds);border:1px solid var(--db);border-radius:14px;padding:24px 20px;cursor:pointer;transition:all .22s;text-decoration:none;text-align:center;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.02),transparent);pointer-events:none;}
.card:hover{border-color:var(--blue-lt);transform:translateY(-3px);box-shadow:0 12px 32px rgba(0,0,0,.4);}
.card-icon{font-size:2rem;margin-bottom:8px;}
.card-title{font-family:'Barlow',sans-serif;font-size:14px;font-weight:800;color:var(--blue-lt);text-transform:uppercase;letter-spacing:.03em;margin-bottom:4px;}
.card-desc{font-size:10px;color:var(--dm);line-height:1.5;}
.card-access{margin-top:10px;padding-top:8px;border-top:1px solid var(--db);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;}
.access-full{color:var(--green);}.access-view{color:var(--gold);}

/* Calendar */
.cycle-group{background:var(--ds);border:1px solid var(--db);border-radius:10px;margin-bottom:10px;overflow:hidden;}
.cycle-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;transition:background .15s;}
.cycle-header:hover{background:var(--ds2);}
.cycle-label{font-size:12px;font-weight:700;color:var(--dt);}
.cycle-meta{font-size:10px;color:var(--dm);}
.team-badge{font-size:9px;font-weight:700;padding:2px 8px;border-radius:10px;}
.badge-a{background:rgba(79,195,247,0.12);color:#4FC3F7;border:1px solid rgba(79,195,247,0.25);}
.badge-b{background:rgba(52,211,153,0.12);color:#34D399;border:1px solid rgba(52,211,153,0.25);}
.cycle-body{display:none;padding:0 16px 12px;}
.cycle-body.open{display:block;}
.cycle-body table{width:100%;border-collapse:collapse;}
.cycle-body th{font-size:9px;font-weight:700;color:var(--dm);text-transform:uppercase;letter-spacing:.08em;padding:6px 8px;text-align:left;border-bottom:1px solid var(--db);}
.cycle-body td{font-size:11px;padding:6px 8px;border-bottom:1px solid rgba(255,255,255,.03);color:var(--dt);}

/* Leadership */
.contact-card{background:var(--ds);border:1px solid var(--db);border-radius:10px;padding:14px 18px;margin-bottom:8px;display:flex;align-items:center;gap:14px;}
.contact-card .cc-role{font-size:10px;font-weight:700;color:var(--dm);text-transform:uppercase;letter-spacing:.06em;min-width:160px;}
.contact-card .cc-name{font-size:12px;font-weight:600;color:var(--dt);flex:1;}
.contact-card .cc-phone{font-size:11px;color:var(--blue-lt);font-family:monospace;}
.contact-card .cc-email{font-size:10px;color:var(--green);}
.contact-card .cc-addr{font-size:10px;color:var(--dm);}

/* Docs */
.doc-section{background:var(--ds);border:1px solid var(--db);border-radius:10px;padding:20px 24px;margin-bottom:12px;}
.doc-section h3{font-family:'Barlow',sans-serif;font-size:14px;font-weight:700;color:var(--blue-lt);margin-bottom:10px;}
.doc-section p,.doc-section li{font-size:11px;color:var(--dm);line-height:1.7;}
.doc-section ul{margin-left:16px;}
.doc-section table{width:100%;border-collapse:collapse;margin:10px 0;}
.doc-section th,.doc-section td{font-size:10px;padding:6px 10px;border:1px solid var(--db);text-align:left;}
.doc-section th{background:var(--ds2);color:var(--dt);font-weight:700;}
.doc-section td{color:var(--dm);}

@media(max-width:768px){.sidebar{width:60px;}.sidebar .nav-label,.sidebar .sb-logo p,.sidebar .sb-logo h2,.sidebar .sb-user,.nav-item span:not(.ni-icon){display:none;}.nav-item{justify-content:center;padding:10px;}.sb-logo{padding:10px 0;}.main-content{padding:16px;}}
</style>

let currentProfile=null;

async function handleLogin(e){
  e.preventDefault();
  const btn=document.getElementById('loginBtn');
  const err=document.getElementById('errorMsg');
  err.textContent='';btn.disabled=true;btn.textContent='Signing in…';
  try{
    await signIn(document.getElementById('emailInput').value.trim(),document.getElementById('passwordInput').value);
    await checkAuthAndRoute();
  }catch(ex){err.textContent=ex.message||'Invalid credentials';btn.disabled=false;btn.textContent='Sign In';}
}

async function checkAuthAndRoute(){
  const session=await getSession();
  if(!session){document.getElementById('loginScreen').style.display='flex';document.getElementById('dashboard').style.display='none';return;}
  const profile=await getUserProfile();
  if(!profile){document.getElementById('errorMsg').textContent='No profile found. Contact admin.';document.getElementById('loginScreen').style.display='flex';document.getElementById('dashboard').style.display='none';return;}
  currentProfile=profile;
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('dashboard').style.display='block';
  const roleLabels={admin:'Administrator',team_leader:'Team Leader',viewer:'Viewer'};
  document.getElementById('userName').textContent=profile.name||profile.email;
  document.getElementById('userRole').textContent=(roleLabels[profile.role]||profile.role)+(profile.team?' · Team '+profile.team:'');
  if(profile.role==='admin')document.getElementById('adminNav').style.display='block';
  renderHome();
  renderCalendar();
  renderLeadership();
  renderDocs();
}

function navTo(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  event.target.closest('.nav-item').classList.add('active');
}

function renderHome(){
  const p=currentProfile;
  const canEditA=p.role==='admin'||(p.role==='team_leader'&&p.team==='A');
  const canEditB=p.role==='admin'||(p.role==='team_leader'&&p.team==='B');
  document.getElementById('page-home').innerHTML=`
    <div class="page-title">Dashboard</div>
    <div class="page-sub">Select a team to manage rosters</div>
    <div class="cards">
      <a href="iv_team_a_roster.html" class="card"><div class="card-icon">🅰️</div><div class="card-title">Team A</div><div class="card-desc">Odd cycles · Jan, Mar, May, Jul, Sep, Nov</div><div class="card-access ${canEditA?'access-full':'access-view'}">${canEditA?'✓ Full Access':'👁 View Only'}</div></a>
      <a href="iv_team_b_roster.html" class="card"><div class="card-icon">🅱️</div><div class="card-title">Team B</div><div class="card-desc">Even cycles · Feb, Apr, Jun, Aug, Oct, Dec</div><div class="card-access ${canEditB?'access-full':'access-view'}">${canEditB?'✓ Full Access':'👁 View Only'}</div></a>
    </div>`;
}

function renderCalendar(){

      <span class="cycle-label">Cycle ${i+1}: ${c.label} <span class="team-badge ${badge}">Team ${c.team}</span></span>
      <span class="cycle-meta">${c.events.length} events</span>
    </div><div class="cycle-body"><table><thead><tr><th>Date</th><th>Day</th><th>Event</th></tr></thead><tbody>`;
    c.events.forEach(ev=>{
      const d=new Date(ev.date);h+=`<tr><td>${d.toLocaleDateString('en-NZ',{day:'numeric',month:'short'})}</td><td>${days[d.getDay()]}</td><td>${ev.name}</td></tr>`;
    });
    h+=`</tbody></table></div></div>`;
  });
  document.getElementById('page-calendar').innerHTML=h;
}

}
