<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IV Roster — Auckland Jamatkhana</title>
<meta property="og:title" content="IV Roster — Auckland Jamatkhana">
<meta property="og:description" content="Ismaili Volunteers Roster Generator">
<meta property="og:type" content="website">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230A1F3D'/%3E%3Ctext x='16' y='22' font-family='sans-serif' font-size='14' font-weight='900' fill='%234FC3F7' text-anchor='middle'%3EIV%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&family=Barlow:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<style>
:root{
  --dp:#020B18;--ds:#071628;--ds2:#0D2040;
  --dt:#E8F4FD;--dm:#7AAECB;--db:rgba(79,195,247,0.18);
  --blue:#1565C0;--blue2:#1976D2;--blue-lt:#4FC3F7;
  --navy:#0C2461;--green:#34D399;--green-bg:rgba(52,211,153,0.12);--green-bd:rgba(52,211,153,0.3);
  --gold:#F59E0B;--gold-bg:rgba(245,158,11,0.12);--gold-bd:rgba(245,158,11,0.3);
  --r:9px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Lexend',sans-serif;background:var(--dp);color:var(--dt);min-height:100vh;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--dp);}::-webkit-scrollbar-thumb{background:var(--blue);border-radius:3px;}

/* Login */
#loginScreen{position:fixed;inset:0;background:var(--dp);z-index:1000;display:flex;align-items:center;justify-content:center;
  background-image:radial-gradient(ellipse at 20% 50%,rgba(21,101,192,.18) 0%,transparent 60%);}
.lbox{background:var(--ds);border:1px solid var(--db);border-radius:16px;padding:44px 40px;width:400px;max-width:92vw;box-shadow:0 24px 64px rgba(0,0,0,.6);animation:fadeUp .5s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.llogo{text-align:center;margin-bottom:28px;}
.llogo-iv{display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;background:var(--blue2);border-radius:8px;font-family:'Barlow',sans-serif;font-weight:900;font-size:18px;color:#fff;margin-bottom:10px;}
.llogo h1{font-family:'Barlow',sans-serif;font-size:22px;font-weight:800;color:var(--blue-lt);text-transform:uppercase;letter-spacing:.04em;}
.llogo p{color:var(--dm);font-size:12px;margin-top:3px;}
.lfg{margin-bottom:15px;}
.lfg label{display:block;font-size:10px;font-weight:700;color:var(--dm);text-transform:uppercase;letter-spacing:.09em;margin-bottom:6px;}
.lfg input{width:100%;background:var(--ds2);border:1px solid var(--db);border-radius:var(--r);padding:10px 14px;color:var(--dt);font-family:'Lexend',sans-serif;font-size:13px;outline:none;transition:border .2s;}
.lfg input:focus{border-color:var(--blue-lt);}
.lbtn{width:100%;background:linear-gradient(135deg,var(--navy),var(--blue2));color:#fff;border:none;border-radius:var(--r);padding:12px;font-family:'Lexend',sans-serif;font-weight:700;font-size:14px;cursor:pointer;margin-top:6px;transition:box-shadow .2s;}
.lbtn:hover{box-shadow:0 6px 20px rgba(21,101,192,.4);}
.lbtn:disabled{opacity:.5;cursor:not-allowed;}
.lerr{color:#f88;font-size:12px;text-align:center;margin-top:10px;min-height:16px;}

/* Dashboard */
#dashboard{display:none;padding:40px 20px;max-width:900px;margin:0 auto;animation:fadeUp .4s ease;}
.dash-header{text-align:center;margin-bottom:32px;}
.dash-header h1{font-family:'Barlow',sans-serif;font-size:24px;font-weight:800;color:var(--blue-lt);text-transform:uppercase;letter-spacing:.04em;}
.dash-header p{color:var(--dm);font-size:12px;margin-top:4px;}
.user-bar{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:14px;}
.user-badge{background:var(--ds2);border:1px solid var(--db);border-radius:20px;padding:6px 14px;font-size:11px;color:var(--dm);}
.user-badge strong{color:var(--dt);}
.btn-logout{background:none;border:1px solid rgba(248,120,120,.3);border-radius:6px;padding:5px 12px;font-size:11px;color:#f88;cursor:pointer;font-family:'Lexend',sans-serif;transition:all .2s;}
.btn-logout:hover{background:rgba(248,120,120,.1);border-color:#f88;}

/* Cards */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px;margin-top:24px;}
.card{background:var(--ds);border:1px solid var(--db);border-radius:14px;padding:28px 22px;cursor:pointer;transition:all .22s;text-decoration:none;text-align:center;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.02),transparent);pointer-events:none;}
.card:hover{border-color:var(--blue-lt);transform:translateY(-3px);box-shadow:0 12px 32px rgba(0,0,0,.4);}
.card-icon{font-size:2.4rem;margin-bottom:10px;}
.card-title{font-family:'Barlow',sans-serif;font-size:16px;font-weight:800;color:var(--blue-lt);text-transform:uppercase;letter-spacing:.03em;margin-bottom:4px;}
.card-desc{font-size:11px;color:var(--dm);line-height:1.5;}
.card-access{margin-top:12px;padding-top:10px;border-top:1px solid var(--db);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;}
.access-full{color:var(--green);}.access-view{color:var(--gold);}
</style>
</head>
<body>

<!-- Login -->
<div id="loginScreen">
  <div class="lbox">
    <div class="llogo">
      <div class="llogo-iv">IV</div>
      <h1>IV Roster</h1>
      <p>Auckland Jamatkhana · Ismaili Volunteers</p>
    </div>
    <form onsubmit="handleLogin(event)">
      <div class="lfg">
        <label>Email</label>
        <input id="emailInput" type="email" placeholder="your@email.com" autocomplete="username" required>
      </div>
      <div class="lfg">
        <label>Password</label>
        <input id="passwordInput" type="password" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button type="submit" class="lbtn" id="loginBtn">Sign In</button>
    </form>
    <div class="lerr" id="errorMsg"></div>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard">
  <div class="dash-header">
    <div class="llogo-iv" style="margin:0 auto 10px;">IV</div>
    <h1>IV Roster</h1>
    <p>Auckland Jamatkhana · Duty Roster Generator</p>
    <div class="user-bar">
      <span class="user-badge"><strong id="userName"></strong> · <span id="userRole"></span></span>
      <button class="btn-logout" onclick="signOut()">Sign Out</button>
    </div>
  </div>
  <div class="cards" id="teamCards"></div>
</div>

<script>
async function handleLogin(e){
  e.preventDefault();
  const btn=document.getElementById('loginBtn');
  const err=document.getElementById('errorMsg');
  err.textContent='';
  btn.disabled=true;btn.textContent='Signing in…';

  try{
    await signIn(
      document.getElementById('emailInput').value.trim(),
      document.getElementById('passwordInput').value
    );
    await checkAuthAndRoute();
  }catch(ex){
    err.textContent=ex.message||'Invalid credentials';
    btn.disabled=false;btn.textContent='Sign In';
  }
}

async function checkAuthAndRoute(){
  const session=await getSession();
  if(!session){
    document.getElementById('loginScreen').style.display='flex';
    document.getElementById('dashboard').style.display='none';
    return;
  }
  const profile=await getUserProfile();
  if(!profile){
    document.getElementById('errorMsg').textContent='No profile found. Contact admin.';
    document.getElementById('loginScreen').style.display='flex';
    document.getElementById('dashboard').style.display='none';
    return;
  }

  document.getElementById('loginScreen').style.display='none';
  document.getElementById('dashboard').style.display='block';
  renderDashboard(profile);
}

function renderDashboard(profile){
  const roleLabels={admin:'Administrator',team_leader:'Team Leader',viewer:'Viewer'};
  document.getElementById('userName').textContent=profile.name||profile.email;
  document.getElementById('userRole').textContent=(roleLabels[profile.role]||profile.role)+(profile.team?' · Team '+profile.team:'');

  const canEditA=profile.role==='admin'||(profile.role==='team_leader'&&profile.team==='A');
  const canEditB=profile.role==='admin'||(profile.role==='team_leader'&&profile.team==='B');

  let cards='';
  cards+=`<a href="iv_team_a_roster.html" class="card">
    <div class="card-icon">🅰️</div>
    <div class="card-title">Team A</div>
    <div class="card-desc">Odd cycles · Jan, Mar, May, Jul, Sep, Nov</div>
    <div class="card-access ${canEditA?'access-full':'access-view'}">${canEditA?'✓ Full Access':'👁 View Only'}</div>
  </a>`;
  cards+=`<a href="iv_team_b_roster.html" class="card">
    <div class="card-icon">🅱️</div>
    <div class="card-title">Team B</div>
    <div class="card-desc">Even cycles · Feb, Apr, Jun, Aug, Oct, Dec</div>
    <div class="card-access ${canEditB?'access-full':'access-view'}">${canEditB?'✓ Full Access':'👁 View Only'}</div>
  </a>`;

  if(profile.role==='admin'){
    cards+=`<a href="admin.html" class="card">
      <div class="card-icon">⚙️</div>
      <div class="card-title">Admin</div>
      <div class="card-desc">Users, audit logs, settings</div>
      <div class="card-access access-full">Admin Only</div>
    </a>`;
  }

  document.getElementById('teamCards').innerHTML=cards;
}

// Check session on load
checkAuthAndRoute();

// Enter key support
document.getElementById('emailInput').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('passwordInput').focus();});
</script>
</body>
</html>
